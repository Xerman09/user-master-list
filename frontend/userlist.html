<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Users and Employees Manager</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="vos.css" />
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        #usersTbody .fullname-cell { cursor: pointer; }
        .tab-button.active { background-color: #1e88e5; color: white; }
        .subtab-button.active { background-color: #e3f2fd; color: #1e88e5; }
        .preview-img { max-height: 120px; border-radius: 8px; }
        .sig-canvas { width: 100%; height: 160px; background: #fff; border: 1px dashed #cbd5e1; border-radius: 8px; }
    </style>
</head>
<body class="text-gray-800 bg-slate-50">

<header class="vos-header">
    <div class="vos-header-inner">
        <div class="vos-brand text-lg">VERTEX</div>
        <button id="logoutBtn" class="vos-btn-secondary">Logout</button>
    </div>
</header>

<main class="mx-auto max-w-6xl px-4 py-8">
    <div class="flex flex-col gap-4">
        <div class="flex items-center justify-between mb-6">
            <h1 class="text-3xl font-bold tracking-tight text-slate-900">Users</h1>
            <button id="newUserBtn" class="vos-btn-primary">Add User</button>
        </div>

        <div class="vos-card overflow-hidden">
            <div class="p-5 border-b border-slate-200">
                <div class="grid grid-cols-1 md:grid-cols-12 gap-x-6 gap-y-4 items-end">
                    <div class="md:col-span-6">
                        <label for="searchBox" class="label">Search</label>
                        <div class="search-container mt-1">
                            <div class="search-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-5 h-5" aria-hidden="true">
                                    <path fill-rule="evenodd" d="M9 3.5a5.5 5.5 0 100 11 5.5 5.5 0 000-11zM2 9a7 7 0 1112.452 4.391l3.328 3.329a.75.75 0 11-1.06 1.06l-3.329-3.328A7 7 0 012 9z" clip-rule="evenodd" />
                                </svg>
                            </div>
                            <input id="searchBox" type="search" class="input w-full" placeholder="Search by name, email or department" />
                        </div>
                    </div>

                    <!-- Email filter -->
                    <fieldset class="md:col-span-3">
                        <legend class="sr-only">Email filter</legend>
                        <div class="flex items-center gap-4 pt-1">
                            <label class="flex items-center gap-2">
                                <input id="withEmailCheckbox" type="checkbox" class="h-4 w-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500" checked />
                                <span class="text-sm">With Email</span>
                            </label>
                            <label class="flex items-center gap-2">
                                <input id="withoutEmailCheckbox" type="checkbox" class="h-4 w-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500" checked />
                                <span class="text-sm">Without Email</span>
                            </label>
                        </div>
                    </fieldset>

                    <!-- Status filter (NEW) -->
                    <fieldset class="md:col-span-3">
                        <legend class="sr-only">Status filter</legend>
                        <div class="flex items-center gap-4 pt-1">
                            <label class="flex items-center gap-2">
                                <input id="showActiveCheckbox" type="checkbox" class="h-4 w-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500" checked />
                                <span class="text-sm">Active</span>
                            </label>
                            <label class="flex items-center gap-2">
                                <input id="showInactiveCheckbox" type="checkbox" class="h-4 w-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500" checked />
                                <span class="text-sm">Inactive</span>
                            </label>
                        </div>
                    </fieldset>

                    <div class="md:col-span-3">
                        <label class="label">Page size</label>
                        <select id="pageSize" class="input mt-1" disabled><option>15</option></select>
                    </div>
                </div>
            </div>

            <div class="overflow-x-auto">
                <table class="vos-table">
                    <thead class="bg-slate-50">
                    <tr>
                        <th class="py-3 px-5 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Name</th>
                        <th class="py-3 px-5 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Department</th>
                        <th class="py-3 px-5 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Designation</th>
                    </tr>
                    </thead>
                    <tbody id="usersTbody" class="divide-y divide-slate-200"></tbody>
                </table>
            </div>

            <div class="vos-table-footer">
                <div id="resultInfo" class="text-sm text-slate-500"></div>
                <div class="flex items-center gap-2">
                    <button id="prevBtn" class="vos-btn-icon" disabled>&laquo;</button>
                    <span id="pageIndicator" class="text-sm font-medium">1</span>
                    <button id="nextBtn" class="vos-btn-icon">&raquo;</button>
                </div>
            </div>
        </div>
    </div>
</main>

<!-- ========== Add User Modal ========== -->
<div id="newUserModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 hidden">
    <div class="vos-modal max-w-4xl w-full">
        <header class="vos-modal-header">
            <h3 class="text-xl font-semibold text-slate-900">Add New User</h3>
        </header>
        <div class="p-6">
            <form id="newUserForm" class="space-y-6">
                <!-- Personal -->
                <div class="space-y-4">
                    <h4 class="font-semibold text-slate-700 border-b pb-2">Personal Information</h4>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div>
                            <label for="newFirstName" class="label">First Name</label>
                            <input type="text" id="newFirstName" name="firstName" class="input" required>
                        </div>
                        <div>
                            <label for="newMiddleName" class="label">Middle Name</label>
                            <input type="text" id="newMiddleName" name="middleName" class="input">
                        </div>
                        <div>
                            <label for="newLastName" class="label">Last Name</label>
                            <input type="text" id="newLastName" name="lastName" class="input" required>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label for="newContact" class="label">Contact Number</label>
                            <input type="tel" id="newContact" name="contact" class="input">
                        </div>
                        <div>
                            <label for="newBirthday" class="label">Birthday</label>
                            <input type="date" id="newBirthday" name="birthday" class="input">
                        </div>
                    </div>
                    <div>
                        <label class="label">Address</label>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <select id="newProvince" name="province" class="input"></select>
                            <select id="newCity" name="city" class="input"></select>
                            <select id="newBarangay" name="barangay" class="input"></select>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="label">Emergency Contact Name</label>
                            <input type="text" id="newEmergencyName" name="emergency_contact_name" class="input">
                        </div>
                        <div>
                            <label class="label">Emergency Contact Number</label>
                            <input type="text" id="newEmergencyPhone" name="emergency_contact_number" class="input">
                        </div>
                    </div>
                </div>

                <!-- Work & Account -->
                <div class="space-y-4">
                    <h4 class="font-semibold text-slate-700 border-b pb-2">Work &amp; Account</h4>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label for="newDepartmentName" class="label">Department</label>
                            <select id="newDepartmentName" name="department" class="input"></select>
                        </div>
                        <div>
                            <label for="newDesignation" class="label">Designation</label>
                            <input type="text" id="newDesignation" name="designation" class="input">
                        </div>
                        <div>
                            <label for="newEmail" class="label">Email</label>
                            <input type="email" id="newEmail" name="email" class="input">
                        </div>
                        <div>
                            <label for="newPassword" class="label">Password</label>
                            <input type="password" id="newPassword" name="password" class="input">
                        </div>
                        <div>
                            <label for="newDateOfHire" class="label">Date of Hire</label>
                            <input type="date" id="newDateOfHire" name="dateOfHire" class="input">
                        </div>
                        <div>
                            <label for="newRfId" class="label">RF ID</label>
                            <input type="text" id="newRfId" name="rf_id" class="input">
                        </div>
                        <div>
                            <label for="newTin" class="label">TIN</label>
                            <input type="text" id="newTin" name="tin" class="input">
                        </div>
                        <div>
                            <label for="newSSS" class="label">SSS</label>
                            <input type="text" id="newSSS" name="sss" class="input">
                        </div>
                        <div>
                            <label for="newPhilhealth" class="label">Philhealth</label>
                            <input type="text" id="newPhilhealth" name="philhealth" class="input">
                        </div>
                        <div>
                            <label for="newPagibig" class="label">PAGIBIG</label>
                            <input type="text" id="newPagibig" name="pagibig" class="input">
                        </div>
                        <div class="flex items-center gap-2">
                            <input type="checkbox" id="newIsAdmin" name="isAdmin" class="h-4 w-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                            <label for="newIsAdmin" class="label m-0">Admin</label>
                        </div>
                    </div>
                </div>

                <!-- Media -->
                <div class="space-y-4">
                    <h4 class="font-semibold text-slate-700 border-b pb-2">Media</h4>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="label">User Image</label>
                            <input id="newUserImage" type="file" accept="image/*" class="input">
                            <img id="newUserImagePreview" class="hidden preview-img mt-2" alt="User preview"/>
                        </div>
                        <div>
                            <label class="label">Signature Image (Upload)</label>
                            <input id="newSignatureFile" type="file" accept="image/*" class="input">
                            <img id="newSignaturePreview" class="hidden preview-img mt-2" alt="Signature preview"/>
                        </div>
                    </div>
                    <div class="mt-2">
                        <label class="label">Signature Pad (optional)</label>
                        <canvas id="newSignatureCanvas" class="sig-canvas"></canvas>
                        <button type="button" id="newSignatureClear" class="vos-btn mt-2">Clear Signature</button>
                    </div>
                </div>

                <p id="newUserFormError" class="text-sm text-danger"></p>
            </form>
        </div>
        <footer class="vos-modal-footer">
            <button type="button" id="cancelNewUserBtn" class="vos-btn">Cancel</button>
            <button type="submit" form="newUserForm" class="vos-btn-primary">Save User</button>
        </footer>
    </div>
</div>

<!-- ========== Edit User Modal ========== -->
<div id="editUserModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 hidden">
    <div class="vos-modal max-w-5xl w-full">
        <header class="vos-modal-header">
            <h3 class="text-xl font-semibold text-slate-900">Edit User Details</h3>
        </header>
        <div class="p-6">
            <section>
                <div class="flex border-b">
                    <button class="tab-button active" data-tab="editProfile" role="tab">Profile</button>
                </div>
                <div class="pt-6">
                    <div id="editProfile" class="tab-content" role="tabpanel">
                        <form id="editUserForm" class="space-y-6" data-user-id="">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8">
                                <!-- Left -->
                                <div class="space-y-4">
                                    <h4 class="font-semibold text-slate-700 border-b pb-2">Personal Information</h4>
                                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                                        <div>
                                            <label class="label">First Name</label>
                                            <input type="text" id="editFirstName" name="firstName" class="input" required>
                                        </div>
                                        <div>
                                            <label class="label">Middle Name</label>
                                            <input type="text" id="editMiddleName" name="middleName" class="input">
                                        </div>
                                        <div>
                                            <label class="label">Last Name</label>
                                            <input type="text" id="editLastName" name="lastName" class="input" required>
                                        </div>
                                    </div>
                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div>
                                            <label class="label">Contact Number</label>
                                            <input type="tel" id="editContact" name="contact" class="input">
                                        </div>
                                        <div>
                                            <label class="label">Birthday</label>
                                            <input type="date" id="editBirthday" name="birthday" class="input">
                                        </div>
                                    </div>
                                    <div>
                                        <label class="label">Address</label>
                                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                                            <select id="editProvince" name="province" class="input"></select>
                                            <select id="editCity" name="city" class="input"></select>
                                            <select id="editBarangay" name="barangay" class="input"></select>
                                        </div>
                                    </div>
                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div>
                                            <label class="label">Emergency Contact Name</label>
                                            <input type="text" id="editEmergencyName" name="emergency_contact_name" class="input">
                                        </div>
                                        <div>
                                            <label class="label">Emergency Contact Number</label>
                                            <input type="text" id="editEmergencyPhone" name="emergency_contact_number" class="input">
                                        </div>
                                    </div>
                                </div>

                                <!-- Right -->
                                <div class="space-y-4">
                                    <h4 class="font-semibold text-slate-700 border-b pb-2">Work &amp; Account</h4>
                                    <div>
                                        <label class="label">Department</label>
                                        <select id="editDepartmentName" name="department" class="input"></select>
                                    </div>
                                    <div>
                                        <label class="label">Designation</label>
                                        <input type="text" id="editDesignation" name="designation" class="input">
                                    </div>
                                    <div>
                                        <label class="label">Email</label>
                                        <input type="email" id="editEmail" name="email" class="input">
                                    </div>
                                    <div>
                                        <label class="label">Password</label>
                                        <input type="password" id="editPassword" name="password" class="input" placeholder="Leave blank to keep current password">
                                    </div>
                                    <div>
                                        <label class="label">Date of Hire</label>
                                        <input type="date" id="editDateOfHire" name="dateOfHire" class="input">
                                    </div>
                                    <div>
                                        <label class="label">RF ID</label>
                                        <input type="text" id="editRfId" name="rf_id" class="input">
                                    </div>
                                    <div>
                                        <label class="label">TIN</label>
                                        <input type="text" id="editTin" name="tin" class="input">
                                    </div>
                                    <div>
                                        <label class="label">SSS</label>
                                        <input type="text" id="editSSS" name="sss" class="input">
                                    </div>
                                    <div>
                                        <label class="label">Philhealth</label>
                                        <input type="text" id="editPhilhealth" name="philhealth" class="input">
                                    </div>
                                    <div>
                                        <label class="label">PAGIBIG</label>
                                        <input type="text" id="editPagibig" name="pagibig" class="input">
                                    </div>
                                    <div class="flex items-center gap-2">
                                        <input type="checkbox" id="editIsAdmin" name="isAdmin" class="h-4 w-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                                        <label for="editIsAdmin" class="label m-0">Admin</label>
                                    </div>
                                    <div class="flex items-center gap-2">
                                        <input type="checkbox" id="editIsDelete" name="isDelete" class="h-4 w-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                                        <label for="editIsDelete" class="label m-0">Inactive</label>
                                    </div>
                                </div>
                            </div>

                            <!-- Media -->
                            <div class="space-y-4">
                                <h4 class="font-semibold text-slate-700 border-b pb-2">Media</h4>
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div>
                                        <label class="label">User Image</label>
                                        <input id="editUserImage" type="file" accept="image/*" class="input">
                                        <img id="editUserImagePreview" class="hidden preview-img mt-2" alt="User preview"/>
                                    </div>
                                    <div>
                                        <label class="label">Signature Image (Upload)</label>
                                        <input id="editSignatureFile" type="file" accept="image/*" class="input">
                                        <img id="editSignaturePreview" class="hidden preview-img mt-2" alt="Signature preview"/>
                                    </div>
                                </div>
                                <div class="mt-2">
                                    <label class="label">Signature Pad (optional)</label>
                                    <canvas id="editSignatureCanvas" class="sig-canvas"></canvas>
                                    <button type="button" id="editSignatureClear" class="vos-btn mt-2">Clear Signature</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </section>
        </div>
        <footer class="flex justify-end gap-3 p-4 border-t border-slate-200 bg-slate-50">
            <button type="button" id="cancelEditUserBtn" class="vos-btn">Cancel</button>
            <button type="submit" form="editUserForm" class="vos-btn-primary">Update User</button>
        </footer>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
