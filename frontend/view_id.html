<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>Employee ID • CR80 / 50×85 (Preview & PNG Export)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/tt-firs-neue-trial" rel="stylesheet">
    <style>
        :root {
            --ink: #0b2a3a;
        }

        html,
        body {
            margin: 0;
            background: #f7fafc;
            color: #0b1220;
            font-family: 'Poppins', system-ui, sans-serif;
        }

        .wrap {
            padding: 20px;
        }

        h1 {
            margin: 0 0 16px;
            font-size: 20px;
        }

        .preview {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }

        .cardbox {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .frame {
            width: 300px;
            aspect-ratio: 638/1011;
            /* true CR80 @300dpi */
            border: 2px solid var(--ink);
            border-radius: 6px;
            overflow: hidden;
            position: relative;
            background: #fff;
        }

        canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
        }

        .actions {
            margin-top: 10px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            border: 1px solid var(--ink);
            background: var(--ink);
            color: #fff;
            border-radius: 8px;
            padding: 8px 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn:active {
            transform: translateY(1px);
        }
    </style>
</head>

<body>
    <div class="wrap">
        <h1>Employee ID (Preview & PNG Export)</h1>
        <div class="preview">
            <div class="cardbox">
                <div class="frame"><canvas id="front"></canvas></div>
                <div class="actions">
                    <button class="btn" id="dlFrontPng">Download Front (PNG)</button>
                </div>
            </div>

            <div class="cardbox">
                <div class="frame"><canvas id="back"></canvas></div>
                <div class="actions">
                    <button class="btn" id="dlBackPng">Download Back (PNG)</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        /* ---------- PHYSICAL / DESIGN SIZES ---------- */
        const DPI = 300;
        const DESIGN = { w: 590, h: 1004 }; // base design space we lay out in
        const CR80MM = { w: 53.98, h: 85.60 };
        const CR80 = {
            w: Math.round(CR80MM.w / 25.4 * DPI), // ≈ 638
            h: Math.round(CR80MM.h / 25.4 * DPI)  // ≈ 1011
        };
        const DPR = Math.max(1, window.devicePixelRatio || 1);

        /* ---------- TEXT OUTLINE SETTINGS ---------- */
        const TEXT_OUTLINE_WIDTH = 4;       // white stroke thickness
        const TEXT_OUTLINE_COLOR = '#fff';  // white outline

        /* ---------- STATIC LAYOUT ---------- */
        const FONT_FAMILY = "Poppins, sans-serif";
        const LAYOUTS = {
            MEN2: {
                PHOTO: { cx: 295, cy: 352, d: 260 },
                NAME_Y: 560,
                POS_Y: 602,
                EMP_SIGN: { y: 760, w: DESIGN.w, h: 150 },
                FONT: "Poppins, sans-serif"
            },
            RSM: {
                PHOTO: { cx: 295, cy: 390, d: 400 },
                NAME_Y: 675,
                POS_Y: 772,
                EMP_SIGN: { y: 840, w: DESIGN.w, h: 150 },
                FONT: "Poppins, sans-serif"
            },
            HVN: {
                PHOTO: { cx: 295, cy: 395, d: 225, shape: 'square' },
                NAME_Y: 610,
                POS_Y: 645,
                EMP_SIGN: { y: 800, w: DESIGN.w, h: 150 },
                FONT: "'TT Firs Neue Trial', sans-serif"
            }
        };

        /* ---------- STATE ---------- */
        const state = {
            size: 'cr80',
            showRing: true,
            textStyles: {
                nameSize: 42,
                nameStretchX: 0.8,     // horizontal stretch for name
                nameStretchY: 1.8,   // vertical stretch for name
                base: 20
            },
            user: null, // will be populated from API
            images: {
                bgF: 'image/front-id.png',
                bgB: 'image/back-id.png',
                user: null,
                sigUser: null,
                sigCEO: 'image/ceo-signature.png' // optional
            }
        };

        /* ---------- HELPERS ---------- */
        const url = new URL(window.location.href);
        const qs = (k) => url.searchParams.get(k);

        async function fetchJSON(path) {
            const res = await fetch(path, { credentials: 'include' });
            if (!res.ok) throw new Error(await res.text());
            return res.json();
        }

        const loadImage = (src) => new Promise(resolve => {
            if (!src) return resolve(null);
            const i = new Image();
            i.crossOrigin = "anonymous";
            i.onload = () => resolve(i);
            i.onerror = () => resolve(null);
            i.src = src;
        });

        // Map API user payload into normalized structure we use
        function mapApiUser(r) {
            const raw = r?.data?.data
                || (Array.isArray(r?.data) ? r.data[0] : r?.data)
                || (Array.isArray(r) ? r[0] : r)
                || r;

            const u = raw || {};
            return {
                nickname: u.nickname || "",
                id: u.user_id ?? 0,
                email: u.user_email || "",
                fname: u.user_fname || "",
                mname: u.user_mname || "",
                lname: u.user_lname || "",
                contact: u.user_contact || "",
                position: u.user_position || "",
                rfid: u.rf_id || "",
                user_image: u.user_image || null,
                signature: u.signature || null,
                city: u.user_city || "",
                province: u.user_province || "",
                birthday: u.user_bday || "",     // raw value from API
                sss: u.user_sss || "",
                philhealth: u.user_philhealth || "",
                pagibig: u.user_pagibig || "",
                tin: u.user_tin || "",
                e_name: u.emergency_contact_name || "",
                e_contact: u.emergency_contact_number || "",
            };
        }

        const FULLNAME = (u) =>
            `${u.fname}${u.mname ? " " + u.mname[0].toUpperCase() + "." : ""} ${u.lname}`.toUpperCase();

        const USERID = (id) => `${state.companyPrefix || 'MEN2'}-${String(id || 0).toString().padStart(4, "0")}`;
        const ADDRESS = (u) => [u.city, u.province].filter(Boolean).join(", ").toUpperCase();
        const fmtBday = (s) =>
            s ? new Date(s).toLocaleDateString('en-US', { month: 'short', day: '2-digit', year: 'numeric' }).toUpperCase() : '';

        /* ---------- CANVAS SETUP ---------- */
        const front = document.getElementById('front');
        const back = document.getElementById('back');

        function targetPx() { return CR80; }

        function setupPreview() {
            const { w, h } = targetPx();
            [front, back].forEach(c => {
                c.width = w * DPR;
                c.height = h * DPR;
                const ctx = c.getContext('2d');
                ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
            });
        }

        /* ---------- DRAW HELPERS ---------- */
        const LOADED = {};
        async function ensureAssets() {
            if (LOADED.ready) return;
            const { bgF, bgB, user, sigUser, sigCEO } = state.images;
            const [a, b, c, d, e] = await Promise.all([
                loadImage(bgF),
                loadImage(bgB),
                loadImage(user),
                loadImage(sigUser),
                loadImage(sigCEO)
            ]);
            Object.assign(LOADED, { bgF: a, bgB: b, user: c, sigUser: d, sigCEO: e, ready: true });
        }

        function drawBackground(ctx, img) {
            ctx.clearRect(0, 0, DESIGN.w, DESIGN.h);
            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, DESIGN.w, DESIGN.h);
            if (!img) return;
            const iw = img.width, ih = img.height;
            const s = Math.max(DESIGN.w / iw, DESIGN.h / ih); // cover
            const w = iw * s, h = ih * s;
            ctx.drawImage(img, (DESIGN.w - w) / 2, (DESIGN.h - h) / 2, w, h);
        }

        function drawCircleImage(ctx, img, cx, cy, d) {
            if (!img) return;
            const r = d / 2;
            ctx.save();
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
            ctx.clip();
            const iw = img.width, ih = img.height;
            const s = Math.max(d / iw, d / ih); // cover
            const dw = iw * s, dh = ih * s;
            ctx.drawImage(img, cx - dw / 2, cy - dh / 2, dw, dh);
            ctx.restore();
        }

        function drawRectImage(ctx, img, cx, cy, d) {
            if (!img) return;
            const r = d / 2;
            ctx.save();
            ctx.beginPath();
            ctx.rect(cx - r, cy - r, d, d);
            ctx.clip();
            const iw = img.width, ih = img.height;
            const s = Math.max(d / iw, d / ih); // cover
            const dw = iw * s, dh = ih * s;
            ctx.drawImage(img, cx - dw / 2, cy - dh / 2, dw, dh);
            ctx.restore();
        }

        function drawTextWithOutline(ctx, text, x, y, align = 'center', fill = '#111', weight = 700, sizePx = 26, hasOutline = true, shadow = null) {
            const layout = state.companyCode ? LAYOUTS[state.companyCode] : null;
            const fontFam = (layout && layout.FONT) ? layout.FONT : FONT_FAMILY;
            ctx.save();
            ctx.fillStyle = fill;
            ctx.textAlign = align;
            ctx.textBaseline = 'alphabetic';
            ctx.font = `${weight} ${sizePx}px ${fontFam}`;

            if (shadow) {
                ctx.shadowColor = shadow.color || 'rgba(0,0,0,0.25)';
                ctx.shadowOffsetX = shadow.ox || 2;
                ctx.shadowOffsetY = shadow.oy || 2;
                ctx.shadowBlur = shadow.blur || 0;
            }

            // outline then fill
            if (hasOutline) {
                ctx.lineWidth = TEXT_OUTLINE_WIDTH;
                ctx.strokeStyle = TEXT_OUTLINE_COLOR;
                ctx.strokeText(text, x, y);
            }
            ctx.fillText(text, x, y);
            ctx.restore();
        }

        function cleanSignatureLine(img) {
            if (!img) return null;
            if (img._cleaned) return img._cleaned;
            const c = document.createElement('canvas');
            c.width = img.width;
            c.height = img.height;
            const ctx = c.getContext('2d');
            ctx.drawImage(img, 0, 0);
            try {
                const imgData = ctx.getImageData(0, 0, c.width, c.height);
                const data = imgData.data;
                const w = c.width, h = c.height;
                // Look for horizontal lines even if slightly thick or tilted
                for (let y = 0; y < h; y++) {
                    let linePixels = 0;
                    for (let x = 0; x < w; x++) {
                        // check current pixel and adjacent vertical pixels
                        let hit = false;
                        for (let dy = -1; dy <= 1; dy++) {
                            let yy = y + dy;
                            if (yy >= 0 && yy < h) {
                                let i = (yy * w + x) * 4;
                                if (data[i + 3] > 20) hit = true;
                            }
                        }
                        if (hit) linePixels++;
                    }
                    // If 30% of the row's width has ink in this small vertical window
                    if (linePixels > w * 0.3) {
                        for (let x = 0; x < w; x++) {
                            let i = (y * w + x) * 4;
                            data[i + 3] = 0; // erase
                        }
                    }
                }
                ctx.putImageData(imgData, 0, 0);
            } catch (e) {
                console.error("CORS or getImageData error:", e);
                // Draw a tiny red dot to indicate failure visually
                ctx.fillStyle = 'red';
                ctx.fillRect(0, 0, 10, 10);
            }
            img._cleaned = c;
            return c;
        }

        function drawCenteredSignature(ctx, img, bandY, bandW, bandH, bolden = true, colorWhite = false) {
            if (!img) return;
            const cleanImg = cleanSignatureLine(img) || img;
            const iw = cleanImg.width, ih = cleanImg.height;
            const s = Math.min(bandW / iw, bandH / ih);
            const dw = iw * s, dh = ih * s;
            const dx = (DESIGN.w - dw) / 2;
            const dy = bandY + (bandH - dh) / 2;
            ctx.save();
            if (colorWhite) {
                ctx.filter = 'brightness(0) invert(1)';
            } else if (bolden) {
                ctx.filter = 'contrast(2.2) brightness(0.7)';
            }
            ctx.drawImage(cleanImg, dx, dy, dw, dh);
            ctx.restore();
        }

        /* ---------- RENDER ---------- */
        function renderSideTo(ctx, outW, outH, side = 'front') {
            const sx = outW / DESIGN.w, sy = outH / DESIGN.h;
            ctx.save();
            ctx.scale(sx, sy);

            const u = state.user;
            const t = state.textStyles;
            const layout = LAYOUTS[state.companyCode] || LAYOUTS.MEN2;
            const { PHOTO, NAME_Y, POS_Y, EMP_SIGN } = layout;

            if (side === 'front') {
                drawBackground(ctx, LOADED.bgF);

                if (PHOTO.shape === 'square') {
                    drawRectImage(ctx, LOADED.user, PHOTO.cx, PHOTO.cy, PHOTO.d);
                } else {
                    drawCircleImage(ctx, LOADED.user, PHOTO.cx, PHOTO.cy, PHOTO.d);
                }

                if (state.showRing) {
                    ctx.beginPath();
                    if (PHOTO.shape === 'square') {
                        const r = PHOTO.d / 2;
                        ctx.rect(PHOTO.cx - r, PHOTO.cy - r, PHOTO.d, PHOTO.d);
                    } else {
                        ctx.arc(PHOTO.cx, PHOTO.cy, PHOTO.d / 2 - 2, 0, Math.PI * 2);
                    }
                    ctx.strokeStyle = '#0b2a3a';
                    ctx.lineWidth = 4;
                    ctx.stroke();
                }

                if (state.companyCode === 'RSM') {
                    // NAME
                    ctx.save();
                    ctx.translate(DESIGN.w / 2, NAME_Y);
                    ctx.scale(Math.max(0.8, t.nameStretchX || 1), Math.max(0.8, t.nameStretchY || 1));
                    drawTextWithOutline(ctx, FULLNAME(u), 0, 0, 'center', '#111', 800, t.nameSize);
                    ctx.restore();

                    // RSM POSITION
                    drawTextWithOutline(ctx, (u.position || '').toUpperCase(), DESIGN.w / 2, POS_Y, 'center', '#fff', 700, 35, false);

                    // RSM INFO (left aligned)
                    drawTextWithOutline(ctx, USERID(u.id), 230, 830, 'left', '#fff', 400, t.base, false);
                    drawTextWithOutline(ctx, u.contact || '', 190, 858, 'left', '#fff', 400, t.base, false);
                    drawTextWithOutline(ctx, u.email || '', 190, 885, 'left', '#fff', 400, t.base, false);

                    // Employee signature
                    drawCenteredSignature(ctx, LOADED.sigUser, EMP_SIGN.y, EMP_SIGN.w, EMP_SIGN.h, true, true);
                } else if (state.companyCode === 'HVN') {

                    //nickname
                    const nick = u.nickname ? `"${u.nickname.toUpperCase()}"` : "";
                    drawTextWithOutline(ctx, nick, DESIGN.w / 2, 555, 'center', '#1a3243', 700, 45, false);

                    // NAME
                    ctx.save();
                    ctx.translate(DESIGN.w / 2, NAME_Y);
                    ctx.scale(Math.max(0.8, t.nameStretchX || 1), Math.max(0.8, t.nameStretchY || 1));
                    drawTextWithOutline(ctx, FULLNAME(u), 0, 0, 'center', '#1a3243', 800, 30, false);
                    ctx.restore();

                    // HVN POSITION
                    drawTextWithOutline(ctx, (u.position || '').toUpperCase(), DESIGN.w / 2, POS_Y, 'center', '#1a3243', 700, 27, false);

                    // HVN INFO (centered)
                    drawTextWithOutline(ctx, "ID NO: " + USERID(u.id), DESIGN.w / 2, 700, 'center', '#1a3243', 600, 26, false);
                    drawTextWithOutline(ctx, "PHONE NO: " + u.contact || '', DESIGN.w / 2, 735, 'center', '#1a3243', 600, 26, false);
                    drawTextWithOutline(ctx, "EMAIL: " + u.email || '', DESIGN.w / 2, 770, 'center', '#1a3243', 600, 24, false);

                    // Employee signature
                    drawCenteredSignature(ctx, LOADED.sigUser, EMP_SIGN.y, EMP_SIGN.w, EMP_SIGN.h, true, false);
                } else {
                    // NAME
                    ctx.save();
                    ctx.translate(DESIGN.w / 2, NAME_Y);
                    ctx.scale(Math.max(0.8, t.nameStretchX || 1), Math.max(0.8, t.nameStretchY || 1));
                    drawTextWithOutline(ctx, FULLNAME(u), 0, 0, 'center', '#111', 800, t.nameSize);
                    ctx.restore();

                    // MEN2 POSITION
                    drawTextWithOutline(ctx, (u.position || '').toUpperCase(), DESIGN.w / 2, POS_Y, 'center', '#111', 700, 27);

                    // MEN2 INFO (left aligned)
                    drawTextWithOutline(ctx, USERID(u.id), 170, 652, 'left', '#111', 600, 24);
                    drawTextWithOutline(ctx, u.contact || '', 170, 687, 'left', '#111', 600, 24);
                    drawTextWithOutline(ctx, u.email || '', 170, 725, 'left', '#111', 600, 24);

                    // Employee signature
                    drawCenteredSignature(ctx, LOADED.sigUser, EMP_SIGN.y, EMP_SIGN.w, EMP_SIGN.h, true, false);
                }

            } else {
                drawBackground(ctx, LOADED.bgB);
                if (state.companyCode === 'RSM') {
                    // RSM Back details
                    drawTextWithOutline(ctx, ADDRESS(u), 250, 255, 'left', '#111', 400, 23);
                    drawTextWithOutline(ctx, fmtBday(u.birthday), 250, 289, 'left', '#111', 400, 25);
                    drawTextWithOutline(ctx, u.sss || '', 250, 325, 'left', '#111', 400, 25);
                    drawTextWithOutline(ctx, u.philhealth || '', 315, 358, 'left', '#111', 400, 25);
                    drawTextWithOutline(ctx, u.pagibig || '', 250, 395, 'left', '#111', 400, 25);
                    drawTextWithOutline(ctx, u.tin || '', 250, 428, 'left', '#111', 400, 25);

                    drawTextWithOutline(ctx, (u.e_name || '').toUpperCase(), 30, 510, 'left', '#111', 400, 23)
                    drawTextWithOutline(ctx, u.e_contact || '', 300, 510, 'left', '#111', 400, 25);
                } else if (state.companyCode === 'HVN') {
                    // HVN Back details
                    const hvnShadow = { color: 'rgba(0,0,0,0.25)', ox: 2, oy: 2 };
                    drawTextWithOutline(ctx, "ADDRESS: " + ADDRESS(u), DESIGN.w / 2, 188, 'center', '#1a3243', 600, 23, false, hvnShadow);
                    drawTextWithOutline(ctx, "BIRTHDAY: " + fmtBday(u.birthday), DESIGN.w / 2, 220, 'center', '#1a3243', 600, 25, false, hvnShadow);
                    drawTextWithOutline(ctx, "SSS NO: " + u.sss || '', DESIGN.w / 2, 253, 'center', '#1a3243', 600, 25, false, hvnShadow);
                    drawTextWithOutline(ctx, "PHILHEALTH NO: " + u.philhealth || '', DESIGN.w / 2, 285, 'center', '#1a3243', 600, 25, false, hvnShadow);
                    drawTextWithOutline(ctx, "PAG-IBIG NO: " + u.pagibig || '', DESIGN.w / 2, 317, 'center', '#1a3243', 600, 25, false, hvnShadow);

                    drawTextWithOutline(ctx, (u.e_name || '').toUpperCase(), 20, 375, 'left', '#1a3243', 600, 23, false, hvnShadow)
                    drawTextWithOutline(ctx, u.e_contact || '', 300, 375, 'left', '#1a3243', 600, 25, false, hvnShadow);
                } else {
                    // MEN2 Back details
                    drawTextWithOutline(ctx, ADDRESS(u), 250, 258, 'left', '#111', 600, 23);
                    drawTextWithOutline(ctx, fmtBday(u.birthday), 250, 290, 'left', '#111', 600, 25);
                    drawTextWithOutline(ctx, u.sss || '', 250, 323, 'left', '#111', 600, 25);
                    drawTextWithOutline(ctx, u.philhealth || '', 250, 355, 'left', '#111', 600, 25);
                    drawTextWithOutline(ctx, u.pagibig || '', 250, 387, 'left', '#111', 600, 25);

                    drawTextWithOutline(ctx, (u.e_name || '').toUpperCase(), 20, 462, 'left', '#111', 600, 23)
                    drawTextWithOutline(ctx, u.e_contact || '', 300, 462, 'left', '#111', 600, 25);
                }

                // Optional CEO signature band (place if you have coordinates—left out here)
                // drawCenteredSignature(ctx, LOADED.sigCEO, 820, DESIGN.w, 80, false);
            }

            ctx.restore();
        }

        /* ---------- EXPORT ---------- */
        async function exportPNG(side = 'front') {
            await ensureAssets();
            const { w, h } = targetPx();
            const c = document.createElement('canvas');
            c.width = w; c.height = h;
            const cx = c.getContext('2d');
            renderSideTo(cx, w, h, side);
            return c.toDataURL('image/png');
        }

        function download(url, name) {
            const a = document.createElement('a');
            a.download = name;
            a.href = url;
            a.click();
        }

        /* ---------- MAIN ---------- */
        (async function init() {
            const id = qs('id');
            if (!id) {
                alert('Missing ?id= parameter');
                return;
            }

            try {
                const cfg = await fetchJSON('/config');
                const code = (cfg.COMPANY_CODE || 'MEN2').toUpperCase();
                state.companyCode = code;

                if (code === 'RSM') {
                    state.companyPrefix = 'RSMHOLDINGS';
                } else if (code === 'HVN') {
                    state.companyPrefix = 'HVN';
                } else {
                    state.companyPrefix = 'MEN2';
                }

                // Dynamically select background images based on the company code
                const codeLower = code.toLowerCase();
                state.images.bgF = `image/front-id-${codeLower}.png`;
                state.images.bgB = `image/back-id-${codeLower}.png`;
            } catch (e) {
                state.companyCode = 'MEN2';
                state.companyPrefix = 'MEN2';
                state.images.bgF = `image/front-id-men2.png`;
                state.images.bgB = `image/back-id-men2.png`;
            }

            // Load user from your API
            let USER;
            try {
                const payload = await fetchJSON(`/items/user/${encodeURIComponent(id)}`);
                USER = mapApiUser(payload);
            } catch (e) {
                console.error(e);
                alert('Failed to load user: ' + e.message);
                return;
            }

            // Bind state
            state.user = USER;
            state.images.user = USER.user_image || null;
            state.images.sigUser = USER.signature || null;

            // Size canvases, load assets, render
            setupPreview();
            await ensureAssets();

            const out = targetPx();
            renderSideTo(front.getContext('2d'), out.w, out.h, 'front');
            renderSideTo(back.getContext('2d'), out.w, out.h, 'back');

            // Downloads
            document.getElementById('dlFrontPng').onclick = async () => {
                const url = await exportPNG('front');
                download(url, `${FULLNAME(state.user)}_Front_${state.size}.png`);
            };
            document.getElementById('dlBackPng').onclick = async () => {
                const url = await exportPNG('back');
                download(url, `${FULLNAME(state.user)}_Back_${state.size}.png`);
            };
        })();
    </script>
</body>

</html>
